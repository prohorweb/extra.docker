version: '3.8'

services:
  php:
    image: php:8.2-fpm
    container_name: extra_php
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: extra
      DB_USER: extra
      DB_PASS: extra123
    command: bash -c "docker-php-ext-install pdo_mysql && docker-php-entrypoint php-fpm"

  composer:
    image: composer:2
    container_name: extra_composer
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      - php
    restart: "no"
    command: ['install', '--no-dev', '--prefer-dist', '--optimize-autoloader', '--no-interaction']

  nginx:
    image: nginx:latest
    container_name: extra_nginx
    ports:
      - "8080:80"
    depends_on:
      - php
    volumes:
      - ./:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mysql:8.0
    container_name: extra_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: extra
      MYSQL_USER: extra
      MYSQL_PASSWORD: extra123
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: extra_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - db
    environment:
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: root123

volumes:
  db_data:
