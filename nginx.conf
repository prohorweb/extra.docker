server {
    listen 80;
    server_name extra.local piter.extra.local matros.extra.local;

    root /var/www/html/frontend/web;
    index index.php index.html index.htm;

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/html/backend/web/;
        index index.php;
        try_files $uri $uri/ @backend;
    }

    location @backend {
        rewrite ^/admin/(.*)$ /admin/index.php?r=$1&$args last;
    }

    location = /admin/index.php {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/web/index.php;
        fastcgi_param SCRIPT_NAME /admin/index.php;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    }

    location ~ /\.(ht|git) {
        deny all;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
